name: QA Pipeline

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: Content Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate seed data
        run: node qa/validate_seed.mjs

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run backend tests
        run: npm test --prefix backend

  mobile-quality:
    name: Mobile Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Generate firebase_options stub for CI
        run: |
          cat > lib/firebase_options.dart << 'DART'
          // CI stub – real file is generated by FlutterFire CLI and gitignored.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'stub',
                appId: 'stub',
                messagingSenderId: 'stub',
                projectId: 'stub',
              );
            }
          }
          DART
        working-directory: app
      - name: Flutter pub get
        run: flutter pub get
        working-directory: app
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: app
      - name: Flutter test
        run: flutter test
        working-directory: app
