openapi: 3.0.3
info:
  title: Estoicismo API
  version: 1.6.0
servers:
  - url: http://localhost:8787
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: ok
  /v1/session:
    post:
      summary: Cria ou renova sessão do dispositivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id: { type: string }
      responses:
        '201':
          description: Sessão criada
          content:
            application/json:
              schema:
                type: object
                required: [user_id, access_token]
                properties:
                  user_id: { type: string, format: uuid }
                  access_token: { type: string }
        '200':
          description: Sessão existente renovada
          content:
            application/json:
              schema:
                type: object
                required: [user_id, access_token]
                properties:
                  user_id: { type: string, format: uuid }
                  access_token: { type: string }
        '400':
          description: Payload inválido
  /v1/daily-package:
    get:
      summary: Retorna pacote diário por timezone
      parameters:
        - in: query
          name: date_local
          schema: { type: string, format: date }
          required: false
        - in: query
          name: timezone
          schema: { type: string }
          required: true
        - in: query
          name: user_context
          schema: { type: string, enum: [trabalho, relacionamentos, ansiedade, foco, decisao_dificil] }
          required: false
      responses:
        '200':
          description: Pacote diário
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DailyPackage' }
        '400':
          description: Parâmetros inválidos ou ausentes
  /v1/checkins:
    post:
      summary: Registra ou atualiza check-in diário
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckinInput' }
      responses:
        '201':
          description: Check-in criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Checkin' }
        '200':
          description: Check-in atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Checkin' }
  /v1/favorites:
    get:
      summary: Lista favoritos do usuário
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
          required: true
      responses:
        '200':
          description: Favoritos
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Favorite' }
    post:
      summary: Adiciona favorito
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FavoriteInput' }
      responses:
        '201':
          description: Favorito criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Favorite' }
        '200':
          description: Favorito já existente
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Favorite' }
    delete:
      summary: Remove favorito
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
          required: true
        - in: query
          name: quote_id
          schema: { type: string }
          required: true
      responses:
        '200':
          description: Remoção aplicada
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed: { type: integer }
  /v1/history:
    get:
      summary: Lista histórico diário (até 30 dias)
      parameters:
        - in: query
          name: timezone
          schema: { type: string }
          required: true
        - in: query
          name: date_local
          schema: { type: string, format: date }
          required: false
        - in: query
          name: days
          schema: { type: integer, minimum: 1, maximum: 30, default: 30 }
        - in: query
          name: user_context
          schema: { type: string, enum: [trabalho, relacionamentos, ansiedade, foco, decisao_dificil] }
          required: false
      responses:
        '200':
          description: Histórico diário
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/DailyPackage' }
  /v1/subscription/entitlement:
    get:
      summary: Retorna entitlement de assinatura do usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Entitlement atual
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Entitlement' }
        '401':
          description: Não autenticado
  /v1/subscription/trial/start:
    post:
      summary: Inicia trial do plano anual
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrialStartInput' }
      responses:
        '201':
          description: Trial iniciado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementEnvelope' }
        '200':
          description: Usuário já possui assinatura ativa/trial
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementEnvelope' }
        '409':
          description: Trial já utilizado
  /v1/subscription/activate:
    post:
      summary: Ativa assinatura (simulação de confirmação de compra)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscriptionActivateInput' }
      responses:
        '200':
          description: Assinatura ativa
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementEnvelope' }
  /v1/subscription/restore:
    post:
      summary: Restaura assinatura com idempotência por chave
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscriptionRestoreInput' }
      responses:
        '200':
          description: Resultado da restauração
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubscriptionRestoreResult' }
  /v1/analytics/events:
    post:
      summary: Registra evento de analytics versionado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnalyticsEventInput' }
      responses:
        '201':
          description: Evento registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyticsEventAccepted' }
        '400':
          description: Payload inválido
        '401':
          description: Não autenticado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID
  schemas:
    Quote:
      type: object
      required: [id, author, text, source_work, source_ref, language, theme_primary, behavior_intent, context_tags, authenticity_level]
      properties:
        id: { type: string }
        author: { type: string, enum: [seneca, epictetus, marcus_aurelius] }
        text: { type: string }
        source_work: { type: string }
        source_ref: { type: string }
        language: { type: string, enum: [pt, en, es] }
        theme_primary: { type: string }
        behavior_intent: { type: string }
        context_tags:
          type: array
          items: { type: string }
        authenticity_level: { type: string, enum: [verified, probable] }
    DailyRecommendation:
      type: object
      required: [id, quote_id, context, action_title, quote_link_explanation, action_steps, estimated_minutes, expected_outcome, completion_criteria, journal_prompt]
      properties:
        id: { type: string }
        quote_id: { type: string }
        context: { type: string, enum: [trabalho, relacionamentos, ansiedade, foco, decisao_dificil] }
        action_title: { type: string }
        quote_link_explanation: { type: string }
        action_steps:
          type: array
          items: { type: string }
        estimated_minutes: { type: integer, minimum: 1, maximum: 30 }
        expected_outcome: { type: string }
        completion_criteria: { type: string }
        journal_prompt: { type: string }
    DailyPackage:
      type: object
      required: [date_local, timezone, quote, recommendation]
      properties:
        date_local: { type: string, format: date }
        timezone: { type: string }
        user_context: { type: string, nullable: true }
        quote: { $ref: '#/components/schemas/Quote' }
        recommendation: { $ref: '#/components/schemas/DailyRecommendation' }
    CheckinInput:
      type: object
      required: [user_id, date_local, applied, timezone]
      properties:
        user_id: { type: string, format: uuid }
        date_local: { type: string, format: date }
        applied: { type: boolean }
        note: { type: string }
        timezone: { type: string }
    Checkin:
      allOf:
        - $ref: '#/components/schemas/CheckinInput'
        - type: object
          required: [id, created_at_utc, updated_at_utc]
          properties:
            id: { type: string, format: uuid }
            created_at_utc: { type: string, format: date-time }
            updated_at_utc: { type: string, format: date-time }
    FavoriteInput:
      type: object
      required: [user_id, quote_id]
      properties:
        user_id: { type: string, format: uuid }
        quote_id: { type: string }
    Favorite:
      allOf:
        - $ref: '#/components/schemas/FavoriteInput'
        - type: object
          required: [id, created_at_utc]
          properties:
            id: { type: string, format: uuid }
            created_at_utc: { type: string, format: date-time }
    AnalyticsEventInput:
      type: object
      required: [event_name, properties]
      properties:
        event_name: { type: string, maxLength: 64 }
        properties:
          type: object
          additionalProperties: true
    AnalyticsEventAccepted:
      type: object
      required: [event_name, event_version]
      properties:
        event_name: { type: string }
        event_version: { type: integer, minimum: 1, maximum: 999 }
    Entitlement:
      type: object
      required: [user_id, status, trial_eligible]
      properties:
        user_id: { type: string, format: uuid }
        status: { type: string, enum: [free, trial, active, canceled] }
        plan:
          type: string
          nullable: true
          enum: [monthly, annual]
        trial_eligible: { type: boolean }
        trial_ends_at_utc:
          type: string
          format: date-time
          nullable: true
        next_billing_at_utc:
          type: string
          format: date-time
          nullable: true
    EntitlementEnvelope:
      type: object
      required: [entitlement]
      properties:
        entitlement: { $ref: '#/components/schemas/Entitlement' }
    TrialStartInput:
      type: object
      properties:
        plan:
          type: string
          enum: [annual]
          default: annual
    SubscriptionActivateInput:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [monthly, annual]
    SubscriptionRestoreInput:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 128
    SubscriptionRestoreResult:
      type: object
      required: [restored, idempotent, entitlement]
      properties:
        restored: { type: boolean }
        idempotent: { type: boolean }
        entitlement: { $ref: '#/components/schemas/Entitlement' }
